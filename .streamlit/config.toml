# Only theme is committed. Port / headless / CORS are set at runtime:
#   - Local:  streamlit run app.py --server.port 2015
#   - Cloud:  Streamlit Community Cloud manages the server config itself.

[theme]
base = "light"
primaryColor = "#8A1538"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F6F8"
textColor = "#101828"
font = "sans serif"
